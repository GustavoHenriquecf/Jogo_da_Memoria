<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória - FIEMG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', Arial, sans-serif;
            background-image: linear-gradient(rgba(35, 58, 138, 0.88), rgba(83, 83, 83, 0.92)), url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between; /* Distribui topo, meio e base pela tela toda */
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            padding: 5vh 0; /* Margem no topo e embaixo */
        }

        /* --- CABEÇALHO (TÍTULO E DASHBOARD) --- */
        .header {
            text-align: center;
            color: #ffffff;
            width: 90vw;
        }

        h1 {
            font-weight: 900;
            font-size: clamp(2rem, 7vw, 4rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 2vh;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            gap: 5vw;
            font-size: clamp(1.2rem, 4vw, 2rem);
            font-weight: 700;
            color: #f7f9f8;
            text-shadow: 1px 2px 5px rgba(0,0,0,0.5);
        }

        .dashboard span {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* --- TABULEIRO --- */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 2vw;
            width: 85vw;
            height: 60vh; /* Ajustado para deixar espaço pro header e footer */
            max-width: 600px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.4, 0.2, 0.2, 1); /* Animação mais fluida */
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px; /* Bordas mais arredondadas como nas fotos */
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        .card-back {
            background: linear-gradient(135deg, #1e8ecd, #233a8a); /* Degradê azul nas cartas */
            color: white;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 900;
            z-index: 2;
            transition: opacity 0.2s, visibility 0.2s;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
            padding: 15%;
            z-index: 1;
        }

        .card.flip .card-back { opacity: 0; visibility: hidden; z-index: 1; }
        .card.flip .card-front { z-index: 2; }
        .card-front img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* --- RODAPÉ --- */
        .footer {
            height: 5vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Aqui você pode colocar a tag <img> com o logo da FIEMG depois */
        .logo-placeholder {
            color: rgba(255,255,255,0.7);
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }

        /* --- MODAL DE VITÓRIA --- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(35, 58, 138, 0.95);
            display: none;
            align-items: center; justify-content: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 5vh 5vw;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 85vw;
            max-width: 500px;
            animation: aparecer 0.4s ease;
            z-index: 12;
        }

        @keyframes aparecer {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal h2 { font-size: clamp(2rem, 6vw, 3rem); color: #233a8a; margin-bottom: 2vh; }
        .modal p { font-size: clamp(1.2rem, 4vw, 1.5rem); color: #535353; margin-bottom: 1vh; }
        .modal .destaque { font-weight: 900; color: #1e8ecd; font-size: 1.3em; display: block; margin: 2vh 0; }

        .btn-restart {
            margin-top: 2vh;
            padding: 2vh 6vw;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 900;
            cursor: pointer;
            background-color: #1e8ecd;
            color: white;
            border: none;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            width: 100%;
        }

        .btn-restart:hover { background-color: #233a8a; transform: scale(1.05); }

        #confetti-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 11; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Encontre os Pares</h1>
        <div class="dashboard">
            <span id="timer-display">00:00</span>
            <span id="moves-display">0 Jogadas</span>
        </div>
    </div>
    
    <div class="game-board" id="game-board"></div>

    <div class="footer">
        <span class="logo-placeholder">FIEMG</span>
    </div>

    <div class="modal" id="win-modal">
        <div class="modal-content">
            <h2>Parabéns! 🎉</h2>
            <p>Você completou o desafio em:</p>
            <span class="destaque" id="final-stats">00:00 e 0 jogadas</span>
            <button class="btn-restart" onclick="iniciarJogo()">Jogar Novamente</button>
        </div>
    </div>

    <canvas id="confetti-canvas"></canvas>

    <script>
        const board = document.getElementById('game-board');
        const modal = document.getElementById('win-modal');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        const timerDisplay = document.getElementById('timer-display');
        const movesDisplay = document.getElementById('moves-display');
        const finalStats = document.getElementById('final-stats');

        const imagens = [
            'img/logo1.png', 'img/logo2.png', 'img/logo3.png', 
            'img/logo4.png', 'img/logo5.png', 'img/logo6.png'
        ];

        let cartas;
        let primeiraCarta = null;
        let segundaCarta = null;
        let bloquearTabuleiro = false;
        let paresEncontrados = 0;
        let animacaoConfete;
        let confetes = [];

        // Variáveis do Dashboard (Cronômetro e Jogadas)
        let jogadas = 0;
        let segundos = 0;
        let cronometroIniciado = false;
        let intervaloCronometro;

        function atualizarDashboard() {
            movesDisplay.innerText = jogadas === 1 ? '1 Jogada' : `${jogadas} Jogadas`;
            const mins = String(Math.floor(segundos / 60)).padStart(2, '0');
            const segs = String(segundos % 60).padStart(2, '0');
            timerDisplay.innerText = `${mins}:${segs}`;
        }

        function iniciarCronometro() {
            if (cronometroIniciado) return;
            cronometroIniciado = true;
            intervaloCronometro = setInterval(() => {
                segundos++;
                atualizarDashboard();
            }, 1000);
        }

        function pararCronometro() {
            clearInterval(intervaloCronometro);
            cronometroIniciado = false;
        }

        function iniciarJogo() {
            modal.style.display = 'none';
            board.innerHTML = '';
            paresEncontrados = 0;
            primeiraCarta = null;
            segundaCarta = null;
            bloquearTabuleiro = false;
            cancelAnimationFrame(animacaoConfete);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Reseta Dashboard
            pararCronometro();
            jogadas = 0;
            segundos = 0;
            atualizarDashboard();

            cartas = [...imagens, ...imagens];
            cartas.sort(() => Math.random() - 0.5);

            cartas.forEach(imgSrc => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.logo = imgSrc;

                card.innerHTML = `
                    <div class="card-face card-front">
                        <img src="${imgSrc}" alt="Logo">
                    </div>
                    <div class="card-face card-back">?</div>
                `;

                card.addEventListener('click', virarCarta);
                board.appendChild(card);
            });
        }

        function virarCarta() {
            iniciarCronometro(); // O tempo começa a rodar no primeiro clique

            if (bloquearTabuleiro) return;
            if (this === primeiraCarta) return;

            this.classList.add('flip');

            if (!primeiraCarta) {
                primeiraCarta = this;
                return;
            }

            segundaCarta = this;
            verificarPar();
        }

        function verificarPar() {
            jogadas++; // Conta uma jogada a cada par virado
            atualizarDashboard();

            let ehPar = primeiraCarta.dataset.logo === segundaCarta.dataset.logo;

            if (ehPar) {
                desabilitarCartas();
                paresEncontrados++;
                if (paresEncontrados === 6) {
                    setTimeout(finalizarJogo, 600);
                }
            } else {
                desvirarCartas();
            }
        }

        function desabilitarCartas() {
            primeiraCarta.removeEventListener('click', virarCarta);
            segundaCarta.removeEventListener('click', virarCarta);
            resetarVariaveis();
        }

        function desvirarCartas() {
            bloquearTabuleiro = true;
            setTimeout(() => {
                primeiraCarta.classList.remove('flip');
                segundaCarta.classList.remove('flip');
                resetarVariaveis();
            }, 1000);
        }

        function resetarVariaveis() {
            [primeiraCarta, segundaCarta, bloquearTabuleiro] = [null, null, false];
        }

        function finalizarJogo() {
            pararCronometro();
            const mins = String(Math.floor(segundos / 60)).padStart(2, '0');
            const segs = String(segundos % 60).padStart(2, '0');
            
            // Atualiza o texto do pop-up de vitória
            finalStats.innerText = `${mins}:${segs} e ${jogadas} jogadas!`;
            
            modal.style.display = 'flex';
            fazerChoverConfete();
        }

        function fazerChoverConfete() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            confetes = [];
            const cores = ['#233a8a', '#1e8ecd', '#535353'];

            for (let i = 0; i < 150; i++) {
                confetes.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    r: Math.random() * 8 + 4,
                    d: Math.random() * canvas.height,
                    cor: cores[Math.floor(Math.random() * cores.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }

            function desenharCena() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                confetes.forEach((c, index) => {
                    c.tiltAngle += c.tiltAngleIncremental;
                    c.y += (Math.cos(c.d) + 3 + c.r / 2) / 2;
                    c.tilt = Math.sin(c.tiltAngle - index / 3) * 15;
                    if (c.y > canvas.height) {
                        confetes[index] = { ...c, x: Math.random() * canvas.width, y: -20 };
                    }
                    ctx.beginPath();
                    ctx.lineWidth = c.r;
                    ctx.strokeStyle = c.cor;
                    ctx.moveTo(c.x + c.tilt + c.r / 2, c.y);
                    ctx.lineTo(c.x + c.tilt, c.y + c.tilt + c.r / 2);
                    ctx.stroke();
                });
                animacaoConfete = requestAnimationFrame(desenharCena);
            }
            desenharCena();
        }

        window.addEventListener('resize', () => {
            if(modal.style.display === 'flex') {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });

        iniciarJogo();
    </script>
</body>
</html>
