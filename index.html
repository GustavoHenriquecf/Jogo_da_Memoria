<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Memória</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 150px);
            grid-template-rows: repeat(3, 150px);
            gap: 15px;
            perspective: 1000px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }

        .card.flip {
            transform: rotateY(180deg);
        }

        .card-face {
            width: 100%;
            height: 100%;
            position: absolute;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        /* Costas da carta (o que aparece antes de virar) */
        .card-back {
            background-color: #2c3e50;
            color: white;
            font-size: 40px;
            font-weight: bold;
        }

        /* Frente da carta (a logomarca) */
        .card-front {
            background-color: #fff;
            transform: rotateY(180deg);
            padding: 10px;
        }

        .card-front img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .btn-restart {
            margin-top: 30px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn-restart:hover {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1>Jogo da Memória</h1>
    <div class="game-board" id="game-board"></div>
    <button class="btn-restart" onclick="iniciarJogo()">Reiniciar Jogo</button>

    <script>
        const board = document.getElementById('game-board');
        // Nomes dos arquivos de imagem que ficarão na pasta "img"
        const imagens = [
            'img/logo1.png', 'img/logo2.png', 'img/logo3.png', 
            'img/logo4.png', 'img/logo5.png', 'img/logo6.png'
        ];

        let cartas;
        let primeiraCarta = null;
        let segundaCarta = null;
        let bloquearTabuleiro = false;
        let paresEncontrados = 0;

        function iniciarJogo() {
            board.innerHTML = '';
            paresEncontrados = 0;
            primeiraCarta = null;
            segundaCarta = null;
            bloquearTabuleiro = false;

            // Duplicar as imagens para criar os pares e embaralhar
            cartas = [...imagens, ...imagens];
            cartas.sort(() => Math.random() - 0.5);

            // Criar elementos no HTML
            cartas.forEach(imgSrc => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.logo = imgSrc;

                card.innerHTML = `
                    <div class="card-face card-front">
                        <img src="${imgSrc}" alt="Logo">
                    </div>
                    <div class="card-face card-back">?</div>
                `;

                card.addEventListener('click', virarCarta);
                board.appendChild(card);
            });
        }

        function virarCarta() {
            if (bloquearTabuleiro) return;
            if (this === primeiraCarta) return;

            this.classList.add('flip');

            if (!primeiraCarta) {
                primeiraCarta = this;
                return;
            }

            segundaCarta = this;
            verificarPar();
        }

        function verificarPar() {
            let ehPar = primeiraCarta.dataset.logo === segundaCarta.dataset.logo;

            if (ehPar) {
                desabilitarCartas();
                paresEncontrados++;
                if (paresEncontrados === 6) {
                    setTimeout(() => alert('Parabéns! Você encontrou todas as logomarcas!'), 500);
                }
            } else {
                desvirarCartas();
            }
        }

        function desabilitarCartas() {
            primeiraCarta.removeEventListener('click', virarCarta);
            segundaCarta.removeEventListener('click', virarCarta);
            resetarVariaveis();
        }

        function desvirarCartas() {
            bloquearTabuleiro = true;
            setTimeout(() => {
                primeiraCarta.classList.remove('flip');
                segundaCarta.classList.remove('flip');
                resetarVariaveis();
            }, 1000); // tempo que a carta fica virada antes de desvirar
        }

        function resetarVariaveis() {
            [primeiraCarta, segundaCarta, bloquearTabuleiro] = [null, null, false];
        }

        // Inicia o jogo ao carregar a página
        iniciarJogo();
    </script>
</body>
</html>
